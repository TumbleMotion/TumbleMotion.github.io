loadSceneBtn.addEventListener('click', () => loadSceneInput.click());
loadSceneInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    let data;
    try { data = JSON.parse(ev.target.result); }
    catch (err) { alert('Could not read this file — it may not be a valid Tumble Motion scene file.'); loadSceneInput.value = ''; return; }
    if (!data || !data.canvas || !Array.isArray(data.objects)) {
      alert("This file doesn't look like a Tumble Motion scene file.");
      loadSceneInput.value = '';
      return;
    }
    if (objectOrder.length > 0 && !confirm('Loading a scene replaces everything currently in the canvas. Continue?')) {
      loadSceneInput.value = '';
      return;
    }
    applyLoadedScene(data);
    loadSceneInput.value = '';
  };
  reader.readAsText(file);
});

function applyLoadedScene(data){
  // Wipe the current scene entirely
  deselect();
  objectOrder.forEach(id => World.remove(world, metaById.get(id).body));
  metaById.clear();
  objectOrder = [];
  selectedIds.clear();
  pins.forEach(p => { if (p.constraint) World.remove(world, p.constraint); });
  pins = [];
  updatePinList();

  // Restore canvas/comp/simulation settings
  const c = data.canvas;
  widthInput.value = c.width; heightInput.value = c.height; fpsInput.value = c.fps;
  gravityInput.value = c.gravity; durationInput.value = c.duration;
  windStrengthInput.value = c.windStrength ?? 0;
  windAngleInput.value = c.windAngle ?? 0;
  turbulenceInput.value = c.turbulence ?? 0;
  bgInput.value = c.background || 'dark';
  gridSnapInput.checked = !!c.gridSnap;
  // Restore guide image if one was saved
  if (c.guideImage) {
    const img = new Image();
    img.onload = () => {
      bgImg = img;
      bgImgLabel.textContent = 'Guide image loaded';
      updateUIState();
    };
    img.src = c.guideImage;
  } else {
    bgImg = null;
    bgImgLabel.textContent = 'No image chosen';
    bgImgClearBtn.disabled = true;
  }
  bgImgOpacity.value = c.guideOpacity ?? 50;
  bgImgX.value = c.guideX ?? 0;
  bgImgY.value = c.guideY ?? 0;
  boundaryFloorInput.checked = !!c.boundaryFloor;
  boundaryLeftInput.checked = !!c.boundaryLeft;
  boundaryRightInput.checked = !!c.boundaryRight;
  boundaryCeilingInput.checked = !!c.boundaryCeiling;
  applyCompSize(); // resizes the canvas and rebuilds boundaries to match

  // Recreate objects one at a time (not in parallel) so they're guaranteed to
  // land back in objectOrder in the same sequence they were saved in,
  // regardless of how fast each image happens to decode.
  let i = 0;
  function next(){
    if (i >= data.objects.length) {
      (data.pins || []).forEach(p => {
        pins.push({ id: pinIdCounter++, objectName: p.objectName,
          worldPoint: { x: p.worldPoint.x, y: p.worldPoint.y },
          localPoint: { x: p.localPoint.x, y: p.localPoint.y },
          pinMode: p.pinMode ?? 'rigid',
          stiffness: p.stiffness ?? 0.5,
          constraint: null });
      });
      updatePinList();
      updateStatus(); updateUIState(); refreshPropertiesPanel(); return;
    }
    const o = data.objects[i++];

    if (o.type === 'rect') {
      const mass = Math.max(0.01, o.mass || 1);
      const friction = o.friction || 0;
      const restitution = o.restitution || 0;
      const isStatic = !!o.isStatic;
      const staticUntilHit = !isStatic && !!o.staticUntilHit;
      const w = o.width || 100, h = o.height || 100;
      const body = Bodies.rectangle(o.x, o.y, w, h, { friction, restitution, isStatic });
      Body.setPosition(body, { x: o.x, y: o.y });
      if (!isStatic) Body.setMass(body, mass);
      if (staticUntilHit) Body.setStatic(body, true);
      Body.setAngle(body, o.angle || 0);
      World.add(world, body);
      const rad = (o.velAngle || 0) * Math.PI / 180;
      const speed = Math.max(0, o.speed || 0);
      const name = uniqueName(o.name || 'Rect');
      metaById.set(body.id, { body, name, type: 'rect', w, h, shape: 'rectangle',
        imgOffX: -w/2, imgOffY: -h/2, staticUntilHit,
        frozenMass: mass, frozenFriction: friction, frozenRestitution: restitution,
        magnet: !!o.magnet, magnetRadius: Math.max(0, o.magnetRadius ?? 150), magnetStrength: o.magnetStrength ?? 5,
        constantSpin: !!o.constantSpin, constantSpinSpeed: o.constantSpinSpeed ?? 90,
        staticOnly: !!o.staticOnly,
        initial: { x: body.position.x, y: body.position.y, angle: o.angle || 0,
          vx: speed * Math.cos(rad), vy: speed * Math.sin(rad),
          spin: (o.spin || 0) * Math.PI / 180 } });
      objectOrder.push(body.id);
      next();
      return;
    }

    const img = new Image();
    img.onload = () => {
      const mass = Math.max(0.01, o.mass || 1);
      const friction = o.friction || 0;
      const restitution = o.restitution || 0;
      const isStatic = !!o.isStatic;
      const staticUntilHit = !isStatic && !!o.staticUntilHit;
      const shape = o.shape || 'rectangle';
      const w = img.naturalWidth, h = img.naturalHeight;
      const { body, imgOffX, imgOffY } = createPhysicsBody(shape, img, o.x, o.y, w, h, { friction, restitution, isStatic });
      // createPhysicsBody's x,y parameters mean "intended image centre" — for
      // hull shapes it internally offsets that to the hull's centroid, but
      // o.x/o.y here is already a saved body.position (a centroid, for hull
      // objects), not an image centre. Passing it straight in would apply
      // that offset a second time. Forcing the position afterward sidesteps
      // the issue entirely: o.x/o.y is exactly the correct final position
      // regardless of shape, so this is a no-op for rectangle/circle and the
      // fix for hull.
      Body.setPosition(body, { x: o.x, y: o.y });
      if (!isStatic) Body.setMass(body, mass);
      if (staticUntilHit) Body.setStatic(body, true);
      Body.setAngle(body, o.angle || 0);
      World.add(world, body);

      const rad = (o.velAngle || 0) * Math.PI / 180;
      const speed = Math.max(0, o.speed || 0);
      const vx0 = speed * Math.cos(rad), vy0 = speed * Math.sin(rad);
      const spin0 = (o.spin || 0) * Math.PI / 180;

      const name = uniqueName(o.name || 'Object');
      metaById.set(body.id, { body, name, img, w, h, shape, imgOffX, imgOffY, staticUntilHit,
        frozenMass: mass, frozenFriction: friction, frozenRestitution: restitution,
        magnet: !!o.magnet, magnetRadius: Math.max(0, o.magnetRadius ?? 150), magnetStrength: o.magnetStrength ?? 5,
        constantSpin: !!o.constantSpin, constantSpinSpeed: o.constantSpinSpeed ?? 90,
        staticOnly: !!o.staticOnly,
        initial: { x: body.position.x, y: body.position.y, angle: o.angle || 0, vx: vx0, vy: vy0, spin: spin0 } });
      objectOrder.push(body.id);
      next();
    };
    img.onerror = () => { console.warn('Skipped one object from the loaded scene — its image data was invalid.'); next(); };
    img.src = o.image;
  }
  next();
}

exportJsonBtn.addEventListener('click', () => {
  return; // Export disabled in demo version
  const c = cfg();
  const data = {
    fps: c.fps, width: c.width, height: c.height, frameCount: frames.length,
    objects: objectOrder.map(id => {
      const m = metaById.get(id);
      const obj = {
        name: m.name,
        type: m.type || 'image',
        frames: frames.map(f => ({ frame: f.frame, x: f.objects[m.name].x, y: f.objects[m.name].y, rotation: f.objects[m.name].rotation })),
      };
      if (m.type === 'rect') { obj.rectW = m.w; obj.rectH = m.h; }
      else { obj.anchorX = round2(-m.imgOffX); obj.anchorY = round2(-m.imgOffY); }
      return obj;
    }),
    pins: pins.map(p => ({
      objectName:   p.objectName,
      worldAnchorX: round2(p.worldPoint.x),
      worldAnchorY: round2(p.worldPoint.y),
      localPointX:  round2(p.localPoint.x),
      localPointY:  round2(p.localPoint.y),
    })),
  };

  // Build a self-contained .jsx — the animation data is baked in as a variable
  // so the user only needs to run this one script in After Effects.
  const jsx = `// Tumble Motion \u2192 After Effects
// Auto-generated by Tumble Motion. Run this script in After Effects with
// your composition active. It will find layers whose names match the object
// names from the simulation and write Position + Rotation keyframes.
// No separate JSON file needed \u2014 the animation data is embedded below.

var data = ${JSON.stringify(data, null, 2)};

app.beginUndoGroup("Import Tumble Motion");

var comp = app.project.activeItem;

if (!(comp instanceof CompItem)) {
    alert("Please select a composition first.");
} else {

    if (Math.abs(comp.frameRate - data.fps) > 0.01) {
        alert(
            "Heads up: this comp is " + comp.frameRate + " fps, but the Tumble Motion " +
            "export was made at " + data.fps + " fps. Positions will still import, but " +
            "timing may not match the simulation preview."
        );
    }

    var missingLayers = [];
    var importedCount = 0;

    // Build a lookup of every layer in the comp, keyed both by its exact name
    // and by its name with any file extension stripped. AE names an imported
    // layer after its source file (e.g. "Cat.png"), but Tumble Motion strips
    // the extension when naming the object (e.g. "Cat") \u2014 this lets either
    // naming style match without renaming layers by hand.
    function stripExt(name) {
        return name.replace(/\\.[^.]+$/, "");
    }

    var byExactName = {};
    var byStrippedName = {};

    for (var li = 1; li <= comp.numLayers; li++) {
        var lyr = comp.layer(li);
        if (!(lyr.name in byExactName)) byExactName[lyr.name] = lyr;
        var stripped = stripExt(lyr.name);
        if (!(stripped in byStrippedName)) byStrippedName[stripped] = lyr;
    }

    for (var o = 0; o < data.objects.length; o++) {

        var obj = data.objects[o];

        if (obj.type === 'rect') {
            for (var ri = comp.numLayers; ri >= 1; ri--) {
                if (comp.layer(ri).name === obj.name) { comp.layer(ri).remove(); break; }
            }
            var shapeLayer = comp.layers.addShape();
            shapeLayer.name = obj.name;
            var grp = shapeLayer.property("Contents").addProperty("ADBE Vector Group");
            grp.name = "Rectangle";
            var gc = grp.property("Contents");
            var rectPath = gc.addProperty("ADBE Vector Shape - Rect");
            rectPath.property("Size").setValue([obj.rectW, obj.rectH]);
            rectPath.property("Position").setValue([0, 0]);
            var fill = gc.addProperty("ADBE Vector Graphic - Fill");
            fill.property("Color").setValue([0.91, 0.91, 0.89]);
            var xf = shapeLayer.property("Transform");
            var rTimes = [], rPos = [], rRot = [];
            for (var f = 0; f < obj.frames.length; f++) {
                var rf = obj.frames[f];
                rTimes.push(rf.frame / data.fps);
                rPos.push([rf.x, rf.y]);
                rRot.push(rf.rotation);
            }
            xf.property("Position").setValuesAtTimes(rTimes, rPos);
            xf.property("Rotation").setValuesAtTimes(rTimes, rRot);
            importedCount++;
            continue;
        }

        var layer = byExactName[obj.name] || byStrippedName[obj.name] || null;

        if (!layer) {
            missingLayers.push(obj.name);
            continue;
        }

        // Use the anchor point exported by Tumble Motion — for convex hull objects
        // the physics centroid is NOT at the visual centre of the image, so using
        // width/2, height/2 here would cause a positional offset on asymmetric shapes.
        try {
            if (layer.source) {
                layer.property("Transform").property("Anchor Point").setValue([obj.anchorX, obj.anchorY]);
            }
        } catch (err) {}

        var posProp = layer.property("Transform").property("Position");
        var rotProp = layer.property("Transform").property("Rotation");

        while (posProp.numKeys > 0) posProp.removeKey(1);
        if (rotProp) while (rotProp.numKeys > 0) rotProp.removeKey(1);

        var is3D = layer.threeDLayer;
        var times = [];
        var posValues = [];
        var rotValues = [];

        for (var f = 0; f < obj.frames.length; f++) {
            var frame = obj.frames[f];
            times.push(frame.frame / data.fps);
            posValues.push(is3D ? [frame.x, frame.y, 0] : [frame.x, frame.y]);
            rotValues.push(frame.rotation);
        }

        // Setting all keyframes in one batched call instead of one at a time
        // is dramatically faster for longer sims with many recorded frames.
        posProp.setValuesAtTimes(times, posValues);
        if (rotProp) rotProp.setValuesAtTimes(times, rotValues);

        importedCount++;
    }

    var summary = "Imported " + importedCount + " of " + data.objects.length + " object(s).";
    if (missingLayers.length) {
        summary += "\\n\\nCouldn't find matching layers for:\\n" + missingLayers.join("\\n") +
                   "\\n\\nLayer names just need to match the object names shown in " +
                   "Tumble Motion (a file extension like .png is fine).";
    }
    alert(summary);
}

// ── Pin nulls ────────────────────────────────────────────────────────────
// World Anchor null: static, sits at the fixed pin world position.
// Attach null: animated, follows the attachment point on the body each frame.
if (data.pins && data.pins.length > 0) {
    for (var li = comp.numLayers; li >= 1; li--) {
        if (comp.layer(li).name.indexOf("[Pin]") === 0) comp.layer(li).remove();
    }
    for (var pi = 0; pi < data.pins.length; pi++) {
        var pin = data.pins[pi];
        var wNull = comp.layers.addNull();
        wNull.name = "[Pin] " + pin.objectName + " - World Anchor";
        wNull.property("Transform").property("Position").setValue([pin.worldAnchorX, pin.worldAnchorY]);
        var objFrames = null;
        for (var oi = 0; oi < data.objects.length; oi++) {
            if (data.objects[oi].name === pin.objectName) { objFrames = data.objects[oi].frames; break; }
        }
        if (objFrames) {
            var aNull = comp.layers.addNull();
            aNull.name = "[Pin] " + pin.objectName + " - Attach";
            var aProp = aNull.property("Transform").property("Position");
            var aTimes = [], aPos = [];
            for (var fi = 0; fi < objFrames.length; fi++) {
                var fr = objFrames[fi];
                var rad = fr.rotation * Math.PI / 180;
                aTimes.push(fr.frame / data.fps);
                aPos.push([
                    fr.x + pin.localPointX * Math.cos(rad) - pin.localPointY * Math.sin(rad),
                    fr.y + pin.localPointX * Math.sin(rad) + pin.localPointY * Math.cos(rad)
                ]);
            }
            aProp.setValuesAtTimes(aTimes, aPos);
        }
    }
}

app.endUndoGroup();
`;

  downloadFile('tumble-export.jsx', jsx, 'application/javascript');
});
// ---------- Pin / Constraint System ----------
function localToWorld(body, lx, ly) {
  const a = body.angle;
  return {
    x: body.position.x + lx * Math.cos(a) - ly * Math.sin(a),
    y: body.position.y + lx * Math.sin(a) + ly * Math.cos(a),
  };
}

function updatePinList() {
  pinList.innerHTML = '';
  pins.forEach((pin, idx) => {
    const num = idx + 1;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex; align-items:center; gap:6px; padding:0; margin-top:6px;';

    const lbl = document.createElement('span');
    lbl.textContent = 'Pin ' + num;
    lbl.style.cssText = 'font-size:11px; color:var(--text-dim); white-space:nowrap;';

    const modeSelect = document.createElement('select');
    modeSelect.style.cssText = 'flex:1; min-width:80px; height:35px;';
    ['rigid','spring'].forEach(val => {
      const opt = document.createElement('option');
      opt.value = val;
      opt.textContent = val.charAt(0).toUpperCase() + val.slice(1);
      if ((pin.pinMode ?? 'rigid') === val) opt.selected = true;
      modeSelect.appendChild(opt);
    });

    const stiffInput = document.createElement('input');
    stiffInput.type = 'number';
    stiffInput.min = '1'; stiffInput.max = '9'; stiffInput.step = '1';
    stiffInput.value = Math.round((pin.stiffness ?? 0.5) * 10);
    stiffInput.title = 'How snappy the spring is. 1 = lazy elastic, 9 = firm snap-back.';
    stiffInput.style.cssText = 'width:56px; height:35px;';
    stiffInput.style.display = (pin.pinMode ?? 'rigid') === 'spring' ? '' : 'none';
    stiffInput.addEventListener('change', () => {
      const v = Math.max(1, Math.min(9, parseInt(stiffInput.value) || 5));
      stiffInput.value = v;
      pin.stiffness = v / 10;
    });

    const del = document.createElement('button');
    del.textContent = '\u2715';
    del.title = 'Remove pin ' + num + ' (' + pin.objectName + ')';
    del.style.cssText = 'width:auto; margin-top:0; height:35px; line-height:1;';
    del.addEventListener('click', () => removePin(pin.id));

    modeSelect.addEventListener('change', () => {
      pin.pinMode = modeSelect.value;
      stiffInput.style.display = modeSelect.value === 'spring' ? '' : 'none';
    });

    row.appendChild(lbl);
    row.appendChild(modeSelect);
    row.appendChild(stiffInput);
    row.appendChild(del);
    pinList.appendChild(row);
  });
}

function removePin(id) {
  pins = pins.filter(p => {
    if (p.id === id) { if (p.constraint) World.remove(world, p.constraint); return false; }
    return true;
  });
  updatePinList();
}

// Draws pin markers on the canvas.
// Orange ⊕ crosshair = world anchor (fixed in space, draggable).
// Teal ● dot = object attachment (moves with the body, draggable to any point on it).
function drawPins() {
  if (!pins.length) return;
  ctx.save();
  pins.forEach(pin => {
    const w = pin.worldPoint;
    const m = [...metaById.values()].find(m => m.name === pin.objectName);
    const ow = m ? localToWorld(m.body, pin.localPoint.x, pin.localPoint.y) : null;

    if (ow) {
      ctx.strokeStyle = 'rgba(240,160,48,0.5)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(w.x, w.y); ctx.lineTo(ow.x, ow.y); ctx.stroke();
      ctx.setLineDash([]);
    }

    // World pin — orange crosshair
    ctx.strokeStyle = '#f0a030'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(w.x, w.y, 7, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w.x - 11, w.y); ctx.lineTo(w.x + 11, w.y);
    ctx.moveTo(w.x, w.y - 11); ctx.lineTo(w.x, w.y + 11);
    ctx.stroke();
    // Pin number above the crosshair
    const pinNum = pins.indexOf(pin) + 1;
    ctx.fillStyle = '#f0a030';
    ctx.font = 'bold 11px "SF Mono", Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(pinNum, w.x, w.y - 15);
    ctx.textAlign = 'left';

    // Object pin — teal dot
    if (ow) {
      ctx.fillStyle = '#30c8c8'; ctx.strokeStyle = '#1a6868'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(ow.x, ow.y, 8.5, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    }
  });
  ctx.restore();
}

pinBtn.addEventListener('click', () => {
  if (selectedIds.size !== 1) return;
  const m = metaById.get([...selectedIds][0]);
  // Only one pin per object
  if (pins.some(p => p.objectName === m.name)) return;
  // Default: top-centre of the object in body-local coords
  const lx = m.imgOffX + m.w / 2;  // = 0 for symmetric shapes
  const ly = m.imgOffY;              // = top edge of image
  const wpt = localToWorld(m.body, lx, ly);
  pins.push({ id: pinIdCounter++, objectName: m.name,
    worldPoint: { x: wpt.x, y: wpt.y },
    localPoint: { x: lx, y: ly },
    pinMode: 'rigid',
    stiffness: 0.5,
    constraint: null });
  updatePinList();
});

pinCentreBtn.addEventListener('click', () => {
  if (selectedIds.size !== 1) return;
  const m = metaById.get([...selectedIds][0]);
  // Only one pin per object
  if (pins.some(p => p.objectName === m.name)) return;
  // Place both the world anchor and the local attachment at the object's
  // geometric centre — zero local offset, world point = current body centre.
  const lx = m.imgOffX + m.w / 2;
  const ly = m.imgOffY + m.h / 2;
  const wpt = localToWorld(m.body, lx, ly);
  pins.push({ id: pinIdCounter++, objectName: m.name,
    worldPoint: { x: wpt.x, y: wpt.y },
    localPoint: { x: lx, y: ly },
    pinMode: 'rigid',
    stiffness: 0.5,
    constraint: null });
  updatePinList();
});

// ---------- Guide Background Image ----------
bgImgBtn.addEventListener('click', () => bgImgInput.click());
bgImgOpacity.addEventListener('change', () => {
  const v = parseFloat(bgImgOpacity.value);
  if (v > 100) bgImgOpacity.value = 100;
  if (v < 0)   bgImgOpacity.value = 0;
});
bgImgInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      bgImg = img;
      bgImgLabel.textContent = file.name;
      updateUIState();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  bgImgInput.value = '';
});
bgImgClearBtn.addEventListener('click', () => {
  bgImg = null;
  bgImgLabel.textContent = 'No image chosen';
  bgImgX.value = 0;
  bgImgY.value = 0;
  updateUIState();
});

// ---------- Draw Rectangle Tool ----------
function createRectObject(x, y, w, h) {
  const cx = x + w / 2, cy = y + h / 2;
  const body = Bodies.rectangle(cx, cy, w, h, { friction: 0.2, restitution: 0.4 });
  Body.setMass(body, 5);
  World.add(world, body);
  const name = uniqueName('Rect');
  metaById.set(body.id, { body, name, type: 'rect', w: Math.round(w), h: Math.round(h),
    shape: 'rectangle', imgOffX: -w/2, imgOffY: -h/2, staticUntilHit: false,
    frozenMass: 5, frozenFriction: 0.2, frozenRestitution: 0.4,
    magnet: false, magnetRadius: 150, magnetStrength: 5, constantSpin: false, constantSpinSpeed: 90, staticOnly: false,
    initial: { x: cx, y: cy, angle: 0, vx: 0, vy: 0, spin: 0 } });
  objectOrder.push(body.id);
  deselect();
  selectedIds.add(body.id);
  refreshPropertiesPanel();
  updateStatus();
  updateUIState();
}

function exitDrawRectMode() {
  drawRectMode = false;
  drawRectStart = null;
  drawRectCurrent = null;
  drawRectBtn.classList.remove('primary');
  canvas.classList.remove('draw-mode');
}

drawRectBtn.addEventListener('click', () => {
  drawRectMode = !drawRectMode;
  drawRectBtn.classList.toggle('primary', drawRectMode);
  canvas.classList.toggle('draw-mode', drawRectMode);
  if (drawRectMode) deselect();
});

// Escape cancels draw mode before a rectangle is committed
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && drawRectMode) exitDrawRectMode();
}, true);

updateUIState();
updateStatus();
